<h1>Histórico Financeiro</h1>

<table border="1">

<tr>
<th>Ano</th>
<th>Mês</th>
<th>Receitas</th>
<th>Despesas</th>
<th>Saldo</th>
</tr>

{% for r in dados %}

<tr>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[2] - r[3] }}</td>
</tr>

{% endfor %}

</table>
